<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form>
        <h1>Temperature Conversion</h1>
        <input type="number" id="textbox" value="0">
        <br>
        <input type="radio" id="ToCel" name="select">
        <label for="ToCel">Fahrenheit -> Celsius </label>
        <br>
        <input type="radio" id="ToFah" name="select">
        <label for="ToFah">Celsius -> Fahrenheit</label>
        <br>
        <button type="button" onclick="convert()">Submit</button>
        <br>
        <p id="output">Select</p>
    </form>

    <script src="script.js"></script>
</body>

</html>
