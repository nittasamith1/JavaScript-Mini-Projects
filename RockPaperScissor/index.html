<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Rock Paper Scissor Game</h2>
    <div id="choice">
        <button onclick="MainFun('Rock')">Rock</button>
        <button onclick="MainFun('Paper')">Paper</button>
        <button onclick="MainFun('Scissor')">Scissor</button>
    </div>
    <div class="output">
        <div id="PersonOutput">Person :</div>
        <div id="ComputerOutput">Computer :</div>
        <div id="result">It's a Tie</div>
    </div>
    <div id="score">
        <div id="PersonScore">Person Score:</div>
        <div id="ComputerScore">Computer Score:</div>
    </div>
    <button onclick="ClearScore()">Reset</button>
    <script src="script.js"></script>
</body>
</html>
